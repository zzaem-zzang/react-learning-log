<!DOCTYPE html>
<html>
  <head>
    <meta
      name="viewport"
      content="minimum-scale=1.0, width=device-width, maximum-scale=1.0, user-scalable=no"
    />
    <meta charset="utf-8" />
    <title>Pure Functions</title>
    <script src="https://unpkg.com/babel-standalone@6.15.0/babel.min.js"></script>
  </head>
  <body>
    <h1>Pure Functions</h1>
    <p>Open the console</p>
    <script type="text/babel">

      // frederick이라는 객체를 만든다.
      var frederick = {
        name: "Frederick Douglass",
        canRead: false,
        canWrite: false
      };

      function selfEducate() {
        frederick.canRead = true;
        frederick.canWrite = true;
      }

      // 실행되면 frederick 객체의 canRead, canWrite 값이 false에서 true로 바뀐다.
      // 비순수함수이다.
      selfEducate();

      console.log(frederick);
    </script>
  </body>
</html>
