<!DOCTYPE html>
<html>
  <head>
    <meta
      name="viewport"
      content="minimum-scale=1.0, width=device-width, maximum-scale=1.0, user-scalable=no"
    />
    <meta charset="utf-8" />
    <title>Immutability</title>
    <script src="https://unpkg.com/babel-standalone@6.15.0/babel.min.js"></script>
  </head>
  <body>
    <h1>Immutability</h1>
    <p>Open the console</p>
    <script type="text/babel">
      // 객체를 생성
      let color_lawn = {
        title: "lawn",
        color: "#00FF00",
        rating: 0
      };

      // color 객체의 rating을 바꿔주는 함수
      function rateColor(color, rating) {
        color.rating = rating;
        return color;
      }

      //
      // rateColor mutates the original color
      //

      // rateColor가 원본 color_lawn 객체를 직접 변경함
      console.log(rateColor(color_lawn, 5).rating);
      console.log(color_lawn.rating);
    </script>
  </body>
</html>
