<!DOCTYPE html>
<html>
  <head>
    <meta
      name="viewport"
      content="minimum-scale=1.0, width=device-width, maximum-scale=1.0, user-scalable=no"
    />
    <meta charset="utf-8" />
    <title>Immutability</title>
    <script src="https://unpkg.com/babel-standalone@6.15.0/babel.min.js"></script>
  </head>
  <body>
    <h1>Immutability</h1>
    <p>Open the console</p>
    <script type="text/babel">
      let color_lawn = {
        title: "lawn",
        color: "#00FF00",
        rating: 0
      };

      // 원본 객체를 직접 바꾸지 않고, 복사본을 만들어 rating만 변경
      var rateColor = function(color, rating) {
        return Object.assign({}, color, { rating: rating });
      };

      //
      // Using Object.assign to create a copy and rate that
      //

      // 복사본의 rating은 5, 원본 color_lawn의 rating은 그대로 0
      console.log(rateColor(color_lawn, 5).rating);
      console.log(color_lawn.rating);
    </script>
  </body>
</html>
